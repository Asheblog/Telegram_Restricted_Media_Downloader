name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签'
        required: false
        default: 'latest'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/asheblog/telegram_restricted_media_downloader

jobs:
  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        shell: bash
        run: |
          image_tag="latest"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            image_tag="${{ inputs.tag }}"
          fi

          {
            echo "IMAGE_TAGS<<EOF"
            echo "${IMAGE_NAME}:latest"
            if [[ "${image_tag}" != "latest" ]]; then
              echo "${IMAGE_NAME}:${image_tag}"
            fi
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  windows:
    name: Windows
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13.2
        uses: actions/setup-python@v6
        with:
          python-version: '3.13.2'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==2.6.7

      - name: Extract metadata
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=${TAG_NAME#v}
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> "$GITHUB_ENV"

      - name: Build with Nuitka
        shell: bash
        run: python build.py

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p "release/使用手册"
          cp "output/TRMD.exe" "release/TRMD.exe"
          cp "res/使用必读.pdf" "release/使用手册/使用必读.pdf"
          cp "res/Wiki.pdf" "release/使用手册/常见问题及解决方案汇总.pdf"
          cp "res/2_5_1.png" "release/使用手册/软件更新教程.png"
          cd release
          "../res/bin/rar.exe" a "TRMD_${{ env.CLEAN_VERSION }}-windows-64.rar" "TRMD.exe" "使用手册"

      - name: Upload release asset to GitHub
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: release/*.rar

  linux:
    name: Linux
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13.2
        uses: actions/setup-python@v6
        with:
          python-version: '3.13.2'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==2.6.7

      - name: Extract metadata
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=${TAG_NAME#v}
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> "$GITHUB_ENV"

      - name: Build with Nuitka
        shell: bash
        run: python3 build.py

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p "release/使用手册"
          cp "output/TRMD" "release/TRMD"
          cp "res/使用必读.pdf" "release/使用手册/使用必读.pdf"
          cp "res/Wiki.pdf" "release/使用手册/常见问题及解决方案汇总.pdf"
          cp "res/2_5_1.png" "release/使用手册/软件更新教程.png"
          cd release
          chmod +x "../res/bin/rar"
          "../res/bin/rar" a "TRMD_${{ env.CLEAN_VERSION }}-linux-64.rar" "TRMD" "使用手册"

      - name: Upload release asset to GitHub
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: release/*.rar
